<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>教務ポータル - 赤点一覧</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin:0;
  font-family: system-ui, sans-serif;
  background:#f3f4f6;
}

/* ===== ヘッダー ===== */
.portal-header {
  background:#004A99;
  color:white;
  padding:18px 40px;
  font-size:20px;
  font-weight:bold;
}

/* ===== コンテナ ===== */
.container {
  max-width:1400px;
  margin:0 auto;
  padding:30px 40px;
}

/* ===== コントロール ===== */
.rp-controls {
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:20px;
}

.rp-controls select,
.rp-controls button {
  padding:8px 14px;
  border-radius:10px;
  border:1px solid #004A99;
  font-weight:600;
}

.rp-controls button {
  background:#004A99;
  color:white;
  cursor:pointer;
}

/* ===== モード切替 ===== */
.rp-mode-switch {
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.rp-mode {
  padding:8px 18px;
  border-radius:999px;
  border:1px solid #004A99;
  background:white;
  cursor:pointer;
  font-weight:600;
}

.rp-mode.active {
  background:#004A99;
  color:white;
}

/* ===== サマリー ===== */
#rp-summary {
  margin-bottom:15px;
  font-weight:600;
}

/* ===== PCテーブル ===== */
.rp-table {
  width:100%;
  border-collapse:collapse;
  font-size:16px;
}

.rp-table th {
  background:#004A99;
  color:white;
  padding:10px;
  position:sticky;
  top:0;
}

.rp-table td {
  padding: 5px 8px;
  border:1px solid #ddd;
  vertical-align:top;
  line-height:1.4;
}

.rp-table tr:nth-child(even) td {
  background:#f7faff;
}

.rp-table tr.danger td {
  background:#ffecec;
}

.rp-table tr.warning td {
  background:#fff7d6;
}

/* 列幅 */
.rp-table th:nth-child(1),
.rp-table td:nth-child(1){ width:70px; }

.rp-table th:nth-child(2),
.rp-table td:nth-child(2){ width:160px; }

.rp-table th:nth-child(3),
.rp-table td:nth-child(3){ width:90px; }

/* 必修/選択タイトル */
.rp-required-title {
  font-weight:700;
  margin-top:6px;
  color:#b00000;
}

.rp-elective-title {
  font-weight:700;
  margin-top:8px;
  color:#004A99;
}

/* PC時2列表示 */
@media (min-width:769px){
  .subject-cell {
    column-count:2;
    column-gap:16px;
  }
}

/* ===== サマリーチップ ===== */
.summary-chip {
  display:inline-block;
  padding:6px 14px;
  border-radius:999px;
  font-weight:600;
  margin-right:10px;
  font-size:14px;
}

.chip-danger {
  background:#ffe5e5;
  color:#b00000;
}

.chip-warning {
  background:#fff6cc;
  color:#c87f00;
}

.chip-safe {
  background:#e6f4ff;
  color:#004A99;
}

.rp-toast {
  display:none;
  position:fixed;
  top:20px;
  right:20px;
  background:#004A99;
  color:white;
  padding:10px 18px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
  font-weight:600;
  z-index:9999;
}

.rp-toast.show {
  display:block;
}

.rp-table td {
  padding:5px 8px;
}

/* 科目別：該当者なし表示 */
.no-result {
  padding: 18px;
  background: #f9fafb;
  border: 1px dashed #cbd5e1;
  border-radius: 10px;
  margin: 10px 0 25px 0;
  color: #64748b;
  font-size: 15px;
  font-weight: 500;
  text-align: center;
}

/* 科目タイトルを少し整える */
.rp-subject-title {
  margin: 25px 0 8px 0;
  font-size: 18px;
  font-weight: 700;
  color: #1e293b;
}
/* PCではモバイルカードを非表示 */
@media (min-width:769px){
  .mobile-card {
    display:none;
  }
}
/* ===== スマホ表示 ===== */
@media (max-width:768px){

  .rp-table { display:none; }

  .mobile-card {
    background:white;
    padding:14px;
    border-radius:14px;
    margin-bottom:14px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
  }

  .mobile-card.danger { border-left:6px solid red; }
  .mobile-card.warning { border-left:6px solid orange; }

  .mobile-name {
    font-weight:700;
    margin-bottom:6px;
  }

  .container { padding:20px; }
}

/* 科目別スマホ警告 */
@media (max-width:768px){
  .subjects-only-warning {
    display:block;
    background:#fff3cd;
    padding:20px;
    border-radius:12px;
    font-weight:bold;
  }
}
.mobile-name {
  font-size:16px;
}

.mobile-card .rp-required-title,
.mobile-card .rp-elective-title {
  margin-top:6px;
}
@media print {
  #mobile-cards {
    display: none !important;
  }
}

</style>
</head>

<body>

<div class="portal-header">
  教務ポータル - 赤点一覧（教員専用）
</div>

<div class="container">
  <div id="redpointsApp"></div>
</div>

<script type="module" src="./js/firebase_init.js"></script>
<script type="module">
  import { initRedpointsStudentsView } from "./js/redpoints_students.js";
  initRedpointsStudentsView({ mountId: "redpointsApp" });
</script>
<div id="rp-toast" class="rp-toast">読み込み中...</div>

</body>
</html>
